site_name: VoiceERA Documentation
site_description: Voice AI platform with telephony, STT, TTS, and LLM agents
repo_url: https://github.com/COSS-India/voicera_mono_repository
repo_name: COSS-India/voicera_mono_repository

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

docs_dir: docs

nav:
  - Home: index.md
  - Getting Started:
      - Overview (plain language): guide/overview.md
      - Prerequisites checklist: guide/prerequisites.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
      - Deployment walkthrough: guide/deployment-walkthrough.md
      - Verify it works: guide/verification.md
  - User Guide:
      - Dashboard walkthrough: guide/dashboard.md
      - Glossary: guide/glossary.md
      - Operations: guide/operations.md
      - FAQ: guide/faq.md
  - Architecture:
      - Overview: architecture/overview.md
      - System Design: architecture/system-design.md
      - Data Flow: architecture/data-flow.md
  - Services:
      - Backend API: services/backend.md
      - Voice Server: services/voice-server.md
      - Frontend Dashboard: services/frontend.md
      - Integrations: services/integrations.md
      - Telephony (Vobiz): services/telephony.md
      - Knowledge Base (RAG): services/knowledge-base.md
      - AI4Bharat STT: services/ai4bharat-stt.md
      - AI4Bharat TTS: services/ai4bharat-tts.md
  - API Reference:
      - REST API: api/rest-api.md
      - WebSocket API: api/websocket-api.md
      - Endpoint quick reference: api/endpoints.md
  - Deployment:
      - Docker: deployment/docker.md
      - Environment variables: deployment/environment.md
      - Public voice server URLs: deployment/public-voice-urls.md
      - Production & security: deployment/production.md
      - Security hardening: deployment/security-hardening.md
  - Development:
      - Local setup: development/local-setup.md
      - Contributing: development/contributing.md
      - Testing: development/testing.md
  - Reference:
      - Quick reference: quick-reference.md
      - Troubleshooting: troubleshooting.md
      - License: legal/license.md
      - Source briefs (writers): source-briefs/README.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
